<div class="login-page">
  <div class="login-bg"></div>
  <div class="login-card mat-elevation-z12">
    <div class="login-header">
      <div class="login-icon">
        <mat-icon>apartment</mat-icon>
      </div>
      <h1>Quản lý Đoàn viên</h1>
      <p>Hệ thống Quản lý Đoàn viên</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="login()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Tên đăng nhập</mat-label>
        <input matInput formControlName="username" autocomplete="username" placeholder="username">
        <mat-icon matPrefix>person</mat-icon>
        <mat-error *ngIf="form.get('username')?.hasError('required')">Vui lòng nhập tên đăng nhập</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Mật khẩu</mat-label>
        <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" autocomplete="current-password">
        <mat-icon matPrefix>lock</mat-icon>
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="form.get('password')?.hasError('required')">Vui lòng nhập mật khẩu</mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" class="full-width login-btn" [disabled]="loading">
        <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
        <mat-icon *ngIf="!loading">login</mat-icon>
        <span>{{ loading ? 'Đang đăng nhập...' : 'Đăng nhập' }}</span>
      </button>
    </form>

    <div class="login-footer">
      <small>© 2024 Quản lý Đoàn viên</small>
    </div>
  </div>
</div>
