<div class="page-header">
  <h2><mat-icon>security</mat-icon> Phân quyền: {{ role?.roleName }}</h2>
  <div class="header-actions">
    <button mat-button (click)="cancel()">Hủy</button>
    <button mat-raised-button color="primary" (click)="save()" [disabled]="loading">
      <mat-icon>save</mat-icon> Lưu lại
    </button>
  </div>
</div>

<mat-card>
  <mat-card-content>
    <mat-spinner *ngIf="loading && !modules.length" diameter="40" class="center-spinner"></mat-spinner>

    <div class="permissions-container" *ngIf="modules.length">
      <div *ngFor="let mod of modules" class="module-section">
        <h3 class="module-title">
          <mat-checkbox (change)="toggleAll(mod, $event)" [checked]="isAllSelected(mod)" color="primary">
            Module: {{ mod }}
          </mat-checkbox>
        </h3>
        
        <div class="perms-grid">
          <div *ngFor="let p of groupedPermissions[mod]" class="perm-item">
            <mat-checkbox [(ngModel)]="p.assigned" color="primary">
              {{ p.permissionName }}
              <small class="text-muted">({{ p.permissionCode }})</small>
            </mat-checkbox>
          </div>
        </div>
        <mat-divider></mat-divider>
      </div>
    </div>
  </mat-card-content>
</mat-card>

<style>
  .module-section { margin-top: 24px; }
  .module-title { background: #eee; padding: 10px 16px; border-radius: 4px; border-left: 4px solid var(--primary); }
  .perms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; padding: 16px; }
  .perm-item { display: flex; align-items: center; }
  .text-muted { font-size: 11px; margin-left: 4px; }
</style>
