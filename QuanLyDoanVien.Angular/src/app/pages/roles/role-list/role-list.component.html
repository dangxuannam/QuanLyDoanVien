<div class="page-header">
  <h2><mat-icon>shield</mat-icon> Quản lý Vai trò & Quyền</h2>
</div>

<mat-card>
  <mat-card-content>
    <mat-spinner *ngIf="loading" diameter="40" class="center-spinner"></mat-spinner>

    <table mat-table [dataSource]="roles" class="full-width" *ngIf="!loading">
      <ng-container matColumnDef="roleName">
        <th mat-header-cell *matHeaderCellDef>Tên vai trò</th>
        <td mat-cell *matCellDef="let r"><strong>{{ r.roleName }}</strong></td>
      </ng-container>

      <ng-container matColumnDef="roleCode">
        <th mat-header-cell *matHeaderCellDef>Mã</th>
        <td mat-cell *matCellDef="let r"><code>{{ r.roleCode }}</code></td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Mô tả</th>
        <td mat-cell *matCellDef="let r">{{ r.description }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Thao tác</th>
        <td mat-cell *matCellDef="let r">
          <button mat-stroked-button color="primary" (click)='managePermissions(r.id)'>
            <mat-icon>lock_open</mat-icon> Phân quyền
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card-content>
</mat-card>
