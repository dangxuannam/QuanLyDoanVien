<div class="page-header">
  <h2><mat-icon>dashboard</mat-icon> Dashboard Tổng hợp</h2>
  <span class="header-subtitle">Năm {{ year }}</span>
</div>

<!-- STAT CARDS -->
<div class="stat-grid stat-grid-2">
  <mat-card class="stat-card accent">
    <mat-card-content>
      <mat-icon class="stat-icon">groups</mat-icon>
      <div class="stat-info">
        <div class="stat-value">{{ memberStats.total ?? '—' }}</div>
        <div class="stat-label">Đoàn viên</div>
      </div>
    </mat-card-content>
  </mat-card>
  <mat-card class="stat-card warn">
    <mat-card-content>
      <mat-icon class="stat-icon">attach_file</mat-icon>
      <div class="stat-info">
        <div class="stat-value">{{ recentFiles.length }}</div>
        <div class="stat-label">File đã upload</div>
      </div>
    </mat-card-content>
  </mat-card>
</div>


<div class="dashboard-full">
  <!-- Recent Files -->
  <mat-card>
    <mat-card-header>
      <mat-icon mat-card-avatar>folder</mat-icon>
      <mat-card-title>File Excel gần đây</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <mat-spinner *ngIf="loading" diameter="32"></mat-spinner>
      <mat-list *ngIf="!loading">
        <mat-list-item *ngFor="let f of recentFiles">
          <mat-icon matListItemIcon color="primary">table_view</mat-icon>
          <span matListItemTitle>{{ f.originalName }}</span>
          <span matListItemLine class="text-muted">{{ f.uploadedAt | date:'dd/MM/yyyy HH:mm' }} &bull; {{ f.sheetCount }} sheet</span>
        </mat-list-item>
        <p *ngIf="recentFiles.length === 0" class="text-muted no-data">Chưa có file nào</p>
      </mat-list>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button color="primary" routerLink="/files/upload">Upload file mới →</button>
    </mat-card-actions>
  </mat-card>
</div>
